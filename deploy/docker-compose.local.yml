# Docker Compose for ManabiHub Local Development
# Usage:
#   docker compose -f deploy/docker-compose.local.yml up -d
#   docker compose -f deploy/docker-compose.local.yml down
#   docker compose -f deploy/docker-compose.local.yml down -v  (reset all data)

services:
  postgres:
    image: postgres:16-alpine
    container_name: manabihub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manabihub}
      POSTGRES_USER: ${POSTGRES_USER:-manabihub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manabihub_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - manabihub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manabihub -d manabihub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment the following service to enable pgAdmin web UI
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: manabihub-pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@manabihub.local}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  manabihub_pgdata:
    driver: local
