version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: manabihub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manabihub}
      POSTGRES_USER: ${POSTGRES_USER:-manabihub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manabihub_dev_password}
    volumes:
      - manabihub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manabihub} -d ${POSTGRES_DB:-manabihub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional pgAdmin service for database management
  # Uncomment the lines below to use pgAdmin locally
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: manabihub-pgadmin
  #   restart: unless-stopped
  #   ports:
  #     - "5050:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@manabihub.local}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
  #   depends_on:
  #     - postgres

volumes:
  manabihub_postgres_data:
