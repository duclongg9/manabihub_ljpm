spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:manabihub}
    username: ${DB_USERNAME:manabihub}
    password: ${DB_PASSWORD:manabihub_dev_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Placeholder configuration for OAuth2 client to satisfy auto-configuration triggers
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-client-id
            client-secret: dummy-client-secret
            scope: openid, profile, email
        provider:
          google:
            issuer-uri: https://accounts.google.com
